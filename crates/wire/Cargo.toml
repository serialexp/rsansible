[package]
name = "rsansible-wire"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Wire protocol for rsansible (generated by binschema)."

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["io-util"] }

# Generated code calls into `binschema_runtime` (BitStreamEncoder/Decoder, error
# types). The crate isn't published — point at the local checkout. Override via
# the BINSCHEMA_RUST_PATH env in CI / a separate clone if needed.
binschema_runtime = { path = "../wire-runtime", package = "binschema-runtime" }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
