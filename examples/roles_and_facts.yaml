# End-to-end exercise of Phase 2b features:
#   - roles:                          (loads ./roles/web/{defaults,tasks,handlers,templates})
#   - gather_facts: true              (implicit `Gathering Facts` task)
#   - template: web.conf.j2           (resolved from role's templates/ dir)
#   - import_tasks: install.yml       (resolved from role's tasks/ dir)
#   - role_defaults precedence        (service_name comes from defaults/main.yml)
#
# Run against the three-container test fixture:
#   examples/roles_and_facts.inventory.yml
#   examples/roles/web/...

- name: roles + facts demo
  hosts: web
  gather_facts: true
  roles:
    - web
  tasks:
    - name: assert facts visible
      assert:
        that:
          - ansible_distribution is defined
          - ansible_hostname is defined
        msg: "expected ansible_* facts to be populated by the implicit gather"

    # include_role with tasks_from: + vars: — splice in a different
    # entry point from the same role, with a per-include var override
    # that surfaces inside the spliced task via Jinja.
    - name: pull in web.extra entry point
      include_role:
        name: web
        tasks_from: extra
      vars:
        extra_msg: "rsansible-demo include_role v1"
