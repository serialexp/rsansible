# End-to-end exercise of the x509 family: openssl_privatekey,
# openssl_csr_pipe, x509_certificate_pipe.
#
# All three modules are *controller-side*: the privkey is generated by
# the rsansible binary itself and shipped via OpWriteFile; the two
# `_pipe` variants synthesize PEMs on the controller and expose them
# through `register.content` (zero wire dispatch).
#
# What the test verifies:
#   1. privkey lands at the requested path on the remote (mode 0600).
#   2. csr_pipe binds `register.content` to a PEM blob.
#   3. cert_pipe binds `register.content` to a self-signed cert PEM
#      whose subject matches the CSR's CN.
#   4. The cert is written to disk via write_file.
#   5. On a second run of this same play, the privkey task reports
#      `changed: false` — the existing-key idempotency contract.
#      The run-summary signal lives in the test's RunReport (per-task
#      changed counts), not in a file written by the play, because we
#      want to assert via the orchestrator's own bookkeeping.
#
# Ed25519 picked for speed: an RSA-4096 keygen would add 1–3 seconds
# per test invocation across two runs, and the controller-side code
# path is identical.

- name: x509 demo
  hosts: all
  gather_facts: false
  tasks:
    - name: generate the private key
      openssl_privatekey:
        path: /tmp/rsansible-x509.key
        type: Ed25519
        mode: 0o600
      register: r_key

    - name: synthesize a CSR off the key
      openssl_csr_pipe:
        privatekey_path: /tmp/rsansible-x509.key
        common_name: rsansible-test-server
        subject_alt_name:
          - "DNS:rsansible-test.example"
      register: r_csr

    - name: self-sign the CSR
      x509_certificate_pipe:
        csr_content: "{{ r_csr.content }}"
        privatekey_content: "{{ r_key.content }}"
        provider: selfsigned
        valid_for_days: 30
      register: r_cert

    - name: write the cert to disk
      write_file:
        path: /tmp/rsansible-x509.crt
        mode: 0o644
        content: "{{ r_cert.content }}"

    - name: write the CSR PEM to disk for the test to inspect
      write_file:
        path: /tmp/rsansible-x509.csr
        mode: 0o644
        content: "{{ r_csr.content }}"

    - name: record privkey task's changed flag
      # Minijinja renders bools as lowercase `true`/`false`; the test
      # asserts run #1 → "true", run #2 → "false". The marker file is
      # the only run-spanning signal we have without extending
      # RunReport with per-task changed-host bookkeeping.
      shell: "printf '%s\\n' '{{ r_key.changed }}' > /tmp/rsansible-x509-key-changed"
